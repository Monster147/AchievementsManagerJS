openapi: 3.0.1
info:
  title: Achievements API
  description: This is a an API for managing Achievements for games
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - description: Localhost server for testing API
    url: http://localhost:8080
tags:
  - name: Games
paths:
  /games:
    description: The resource that contains all games
    post:
      tags:
        - Games
      summary: Create a new game
      description: Creates a new game with the provided name and achievements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewGame'
      responses:
        201:
          description: Game created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewGame'
        400:
          $ref: "#/components/responses/400BadRequest"
    get:
      tags:
        - Games
      summary: Get all games
      description: Returns a list of all games.
      responses:
        200:
          description: In case of success, returns a list of tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
  /games/{gameID}:
    description: The resource that contains a specific game
    parameters:
      - name: gameID
        in: path
        required: true
        description: The ID of the game to retrieve.
        schema:
          type: integer
    get:
      tags:
        - Games
      summary: Get a specific game by ID
      description: Returns the details of a specific game.
      responses:
        200:
          description: In case of success, returns the details of the game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        404:
          $ref: "#/components/responses/404NotFound"
    put:
      tags:
        - Games
      summary: Update a game
      description: Update the details of a specific game.
      operationId: updateGame
      parameters:
        - name: gameId
          in: path
          description: Id of the group to be updated
          required: true
          schema:
            type: integer
      requestBody:
        description: Game data to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewGame"
    delete:
      tags:
        - Games
      summary: Delete a specific game by ID
      description: Deletes a specific game by ID.
      responses:
        204:
          description: Game deleted successfully.
        404:
          $ref: "#/components/responses/404NotFound"
  /games/{gameID}/achievements:
    get:
      tags:
        - Games
      summary: Get game with completed achievements for a game
      description: Returns a game with the achievements completed.
      responses:
        200:
          description: In case of success, returns a game.
          content:
            application/json:
              schema:
                type: object
                properties:
                  $ref: "#/components/schemas/Game"
        404:
          $ref: "#/components/responses/404NotFound"
    post:
      tags:
        - Games
      summary: Marks an achievement as completed for a specific game
      description: Marks an achievement as completed for a specific game.
      parameters:
        - name: gameID
          in: path
          required: true
          description: The ID of the game to mark an achievement for.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Achievement'
      responses:
        201:
          description: Achievement created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewGame/achievements'
        400:
          $ref: "#/components/responses/400BadRequest"
  /games/{gameID}/achievements/add:
    post:
      tags:
        - Games
      summary: Adds an achievement to a specific game
      description: Adds an achievement to a specific game.
      parameters:
        - name: gameID
          in: path
          required: true
          description: The ID of the game to add an achievement to.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Achievement'
      responses:
        201:
          description: Achievement created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewGame/achievements'
        400:
          $ref: "#/components/responses/400BadRequest"
  /games/search:
    get:
      tags:
        - Games
      summary: Search for games by name
      description: Returns a list of games that match the search criteria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Game 1"
                source:
                  type: string
                  example: "Steam"
      responses:
        200:
          description: In case of success, returns a list of games.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
        404:
          $ref: "#/components/responses/404NotFound"
  /games/search/{gameID}/achievements:
    get:
      tags:
        - Games
      summary: Search for games by name
      description: Returns a list of games that match the search criteria.
      parameters:
        - name: gameID
          in: path
          required: true
          description: The ID of the game to add an achievement to.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  example: "Steam"
      responses:
        200:
          description: In case of success, returns a list of games.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
        404:
          $ref: "#/components/responses/404NotFound"
  components:
    schemas:
      NewGame:
        type: object
        properties:
          name:
            type: string
            example: "Game 1"
          id:
            type: integer
            example: 1
          genre:
            type: string
            example: "Action"
          platform:
            type: string
            example: "PC"
          releaseYear:
            type: integer
            example: 2023
          achievements:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  example: "Achievement 1"
                description:
                  type: string
                  example: "Description of Achievement 1"
                completed:
                  type: boolean
                  example: false
      Game:
        allOf:
          - $ref: "#/components/schemas/NewTask"
          - type: object
            required:
              - id
            properties:
              id:
                type: integer
                example: 1
      Achievement:
        type: object
        properties:
          name:
            type: string
            example: "Achievement 1"
          description:
            type: string
            example: "Description of Achievement 1"
          completed:
            type: boolean
            example: false
      MissingParameter:
        type: object
        properties:
          code:
            type: integer
            example: 1
          error:
            type: string
            example: "Missing required parameter"
      InvalidParameter:
        type: object
        properties:
          code:
            type: integer
            example: 2
          error:
            type: string
            example: "Invalid parameter 'abc'"
      InvalidBody:
        type: object
        properties:
          code:
            type: integer
            example: 3
          error:
            type: string
            example: "Invalid body content"
      GameNotFound:
        type: object
        properties:
          code:
            type: integer
            example: 4
          error:
            type: string
            example: "Game with id 1 not found"
  responses:
    404NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GameNotFound"
    400BadRequest:
      description: "Invalid Request because of a missing Parameter or invalid body content"
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MissingParameter"
              - $ref: "#/components/schemas/InvalidParameter"
              - $ref: "#/components/schemas/InvalidBody"